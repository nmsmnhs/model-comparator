<!DOCTYPE html>
<html>
<head>
    <title>ML Model Analyzer</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<div class="container">
    <h1>Machine Learning Model Analyzer</h1>

    <form id="csvForm" enctype="multipart/form-data">
        <input type="file" name="csvFileInput" accept=".csv" required>
        <button type="submit">Upload Dataset</button>
    </form>

    <div id="dropdownSection" class="hidden">
        <h3>Select Target Variable</h3>
        <select id="targetSelect"></select>
        <button id="analyzeBtn">Run Analysis</button>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
