<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Model Analyzer</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

    <div class="page-wrap">

        <div class="hero">
            <h1>Automated <em>Model Evaluation</em><br>for Any CSV Dataset</h1>
            <p>Upload a dataset, select a target variable, and get instant comparisons across Logistic Regression,
                Decision Tree, and Random Forest.</p>
        </div>

        <!-- Step 1: Upload -->
        <div class="card">
            <p class="card-title">Step 01 — Upload Dataset</p>
            <form id="csvForm" enctype="multipart/form-data">
                <div class="upload-zone">
                    <span class="upload-icon">⬆</span>
                    <p>Click to select a CSV file</p>
                    <span id="fileLabel">No file chosen</span>
                    <input type="file" name="csvFileInput" accept=".csv" required>
                </div>
                <button type="submit" class="btn btn-primary">Upload Dataset</button>
            </form>
            <div id="uploadStatus" class="status hidden"></div>
        </div>

        <!-- Step 2: Select Target -->
        <div id="dropdownSection" class="card hidden">
            <p class="card-title">Step 02 — Select Target Variable</p>
            <select id="targetSelect"></select>
            <button id="analyzeBtn" class="btn btn-primary">Run Analysis</button>
            <div id="analyzeStatus" class="status hidden"></div>
        </div>

    </div>

    <script src="/static/script.js"></script>
</body>

</html>
