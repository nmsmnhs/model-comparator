<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results — ML Model Analyzer</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header class="site-header">
        <a href="/" class="logo">model<span>.</span>compare</a>
        <span class="header-tag">Results</span>
    </header>

    <div class="page-wrap" id="resultsRoot">

        <!-- Best Models Banner -->
        <div class="best-banner" id="bestModelsBanner"></div>

        <!-- Metrics Table -->
        <div class="card">
            <p class="section-header">Performance Metrics</p>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Model</th>
                            <th>Accuracy</th>
                            <th>Precision</th>
                            <th>AUC</th>
                            <th>Train Time</th>
                        </tr>
                    </thead>
                    <tbody id="metricsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Bar Chart -->
        <div class="card">
            <p class="section-header">Accuracy &amp; Precision Comparison</p>
            <div class="chart-wrap">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <!-- ROC Chart -->
        <div class="card" id="rocSection">
            <p class="section-header">ROC Curves (Binary Classification)</p>
            <div class="chart-wrap">
                <canvas id="rocChart"></canvas>
            </div>
        </div>

        <!-- Confusion Matrices -->
        <div class="card">
            <p class="section-header">Confusion Matrices</p>
            <div class="cm-grid" id="confusionMatrices"></div>
        </div>

        <a href="/" class="back-link">← Analyze Another Dataset</a>

    </div>

    <script src="/static/script.js"></script>
</body>

</html>
